apiVersion: v1
kind: Service
metadata:
  name: maki-recall
  namespace: maki
  labels:
    app: maki-recall
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: maki-recall
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maki-recall
  namespace: maki
  labels:
    app: maki-recall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maki-recall
  template:
    metadata:
      labels:
        app: maki-recall
    spec:
      containers:
        - name: mem0
          image: localhost:32000/maki-recall:v0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: maki-vault
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: maki
            - name: POSTGRES_USER
              value: maki
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: maki-vault-secret
                  key: password
            - name: NEO4J_URI
              value: bolt://maki-graph:7687
            - name: NEO4J_USERNAME
              value: neo4j
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: maki-graph-auth
                  key: password
            - name: OLLAMA_URL
              value: http://maki-embed:11434
            - name: LLM_PROVIDER
              value: openai
            - name: LLM_URL
              value: http://maki-synapse:8080/v1
            - name: LLM_MODEL
              value: claude-sonnet-4-20250514
            - name: EMBEDDER_MODEL
              value: nomic-embed-text
            - name: EMBEDDING_DIMS
              value: "768"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
