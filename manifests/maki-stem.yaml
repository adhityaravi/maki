apiVersion: v1
kind: Service
metadata:
  name: maki-stem
  namespace: maki
  labels:
    app: maki-stem
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: maki-stem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maki-stem
  namespace: maki
  labels:
    app: maki-stem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maki-stem
  template:
    metadata:
      labels:
        app: maki-stem
    spec:
      containers:
        - name: stem
          image: ghcr.io/adhityaravi/maki-stem:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: NATS_URL
              value: "nats://maki-nerve-nats:4222"
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: maki-nats-auth
                  key: token
            - name: TURN_TIMEOUT
              value: "1800"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
