apiVersion: v1
kind: Service
metadata:
  name: maki-stem
  namespace: maki
  labels:
    app: maki-stem
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: maki-stem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maki-stem
  namespace: maki
  labels:
    app: maki-stem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maki-stem
  template:
    metadata:
      labels:
        app: maki-stem
    spec:
      volumes:
        - name: github-key
          secret:
            secretName: maki-github-app
            items:
              - key: private-key.pem
                path: private-key.pem
      containers:
        - name: stem
          image: ghcr.io/adhityaravi/maki-stem:sha-2765241
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: github-key
              mountPath: /etc/maki-github
              readOnly: true
          env:
            - name: NATS_URL
              value: "nats://maki-nerve-nats:4222"
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: maki-nats-auth
                  key: token
            - name: TURN_TIMEOUT
              value: "1800"
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: maki-github-app
                  key: app-id
            - name: GITHUB_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: maki-github-app
                  key: installation-id
            - name: GITHUB_PRIVATE_KEY_PATH
              value: "/etc/maki-github/private-key.pem"
            - name: REPO_OWNER
              value: "adhityaravi"
            - name: REPO_NAME
              value: "maki"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
