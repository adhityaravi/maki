apiVersion: v1
kind: Service
metadata:
  name: maki-synapse
  namespace: maki
  labels:
    app: maki-synapse
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: maki-synapse
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maki-synapse
  namespace: maki
  labels:
    app: maki-synapse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maki-synapse
  template:
    metadata:
      labels:
        app: maki-synapse
    spec:
      containers:
        - name: synapse
          image: ghcr.io/adhityaravi/maki-synapse:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: maki-claude-auth
                  key: token
            - name: MAX_CONCURRENT_QUERIES
              value: "3"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
