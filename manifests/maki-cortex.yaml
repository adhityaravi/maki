apiVersion: v1
kind: Service
metadata:
  name: maki-cortex
  namespace: maki
  labels:
    app: maki-cortex
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: maki-cortex
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maki-cortex
  namespace: maki
  labels:
    app: maki-cortex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maki-cortex
  template:
    metadata:
      labels:
        app: maki-cortex
    spec:
      volumes:
        - name: github-key
          secret:
            secretName: maki-github-app
            items:
              - key: private-key.pem
                path: private-key.pem
      containers:
        - name: cortex
          image: ghcr.io/adhityaravi/maki-cortex:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: github-key
              mountPath: /etc/maki-github
              readOnly: true
          env:
            - name: CLAUDE_MODEL
              value: "claude-opus-4-6"
            - name: NATS_URL
              value: "nats://maki-nerve-nats:4222"
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: maki-nats-auth
                  key: token
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: maki-claude-auth
                  key: token
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: maki-github-app
                  key: app-id
            - name: GITHUB_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: maki-github-app
                  key: installation-id
            - name: GITHUB_PRIVATE_KEY_PATH
              value: "/etc/maki-github/private-key.pem"
            - name: REPO_OWNER
              value: "adhityaravi"
            - name: REPO_NAME
              value: "maki"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
