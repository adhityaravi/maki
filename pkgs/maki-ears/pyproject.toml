[project]
name = "maki-ears"
dynamic = ["version"]
requires-python = ">=3.12"
dependencies = [
    "maki-common",
    "discord.py>=2.4",
]

[project.scripts]
maki-ears = "maki_ears.main:cli"

[tool.uv.sources]
maki-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/maki_ears/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/maki_ears"]
