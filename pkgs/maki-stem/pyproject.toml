[project]
name = "maki-stem"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "maki-common[fastapi,httpx,github]",
    "croniter>=1.4",
]

[project.scripts]
maki-stem = "maki_stem.main:cli"

[tool.uv.sources]
maki-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maki_stem"]
