[project]
name = "maki-immune"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "maki-common[claude,httpx,k8s]",
]

[project.scripts]
maki-immune = "maki_immune.main:cli"

[tool.uv.sources]
maki-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maki_immune"]
