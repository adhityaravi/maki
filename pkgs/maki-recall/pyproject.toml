[project]
name = "maki-recall"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "maki-common[fastapi]",
    "mem0ai[graph]",
    "psycopg2-binary",
    "psycopg[binary,pool]",
    "rank-bm25",
    "langchain-neo4j",
    "neo4j",
    "ollama",
]

[project.scripts]
maki-recall = "maki_recall.main:cli"

[tool.uv.sources]
maki-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maki_recall"]
