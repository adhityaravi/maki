[project]
name = "maki-common"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = ["nats-py>=2.9", "structlog>=24.0"]

[project.optional-dependencies]
claude = ["claude-agent-sdk"]
fastapi = ["fastapi>=0.115", "uvicorn>=0.34"]
codegraph = ["tree-sitter>=0.23", "tree-sitter-python>=0.23", "tree-sitter-go>=0.23"]
github = ["httpx>=0.28", "PyJWT[crypto]>=2.9"]
httpx = ["httpx>=0.28"]
k8s = ["kubernetes>=31"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maki_common"]
