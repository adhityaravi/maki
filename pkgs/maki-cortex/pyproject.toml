[project]
name = "maki-cortex"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "maki-common[claude,github]",
]

[project.scripts]
maki-cortex = "maki_cortex.main:cli"

[tool.uv.sources]
maki-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maki_cortex"]
