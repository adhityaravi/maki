[project]
name = "maki-cortex"
dynamic = ["version"]
requires-python = ">=3.12"
dependencies = [
    "maki-common[claude]",
]

[project.scripts]
maki-cortex = "maki_cortex.main:cli"

[tool.uv.sources]
maki-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/maki_cortex/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/maki_cortex"]
