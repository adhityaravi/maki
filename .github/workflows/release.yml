name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      common--release_created: ${{ steps.release.outputs['pkgs/maki-common--release_created'] }}
      cortex--release_created: ${{ steps.release.outputs['pkgs/maki-cortex--release_created'] }}
      stem--release_created: ${{ steps.release.outputs['pkgs/maki-stem--release_created'] }}
      ears--release_created: ${{ steps.release.outputs['pkgs/maki-ears--release_created'] }}
      immune--release_created: ${{ steps.release.outputs['pkgs/maki-immune--release_created'] }}
      recall--release_created: ${{ steps.release.outputs['pkgs/maki-recall--release_created'] }}
      synapse--release_created: ${{ steps.release.outputs['pkgs/maki-synapse--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # NOTE: Publish steps are intentionally inlined here instead of using a reusable workflow.
  # PyPI Trusted Publishing does not support reusable workflows - the job_workflow_ref claim
  # must match the workflow configured in PyPI, which requires the pypi-publish action to run
  # directly in this workflow file. See: https://github.com/pypa/gh-action-pypi-publish/issues/166

  publish-common:
    needs: release-please
    if: needs.release-please.outputs.common--release_created == 'true'
    runs-on: ubuntu-latest
    environment: maki-common
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build --package maki-common --out-dir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-cortex:
    needs: release-please
    if: needs.release-please.outputs.cortex--release_created == 'true'
    runs-on: ubuntu-latest
    environment: maki-cortex
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build --package maki-cortex --out-dir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-stem:
    needs: release-please
    if: needs.release-please.outputs.stem--release_created == 'true'
    runs-on: ubuntu-latest
    environment: maki-stem
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build --package maki-stem --out-dir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-ears:
    needs: release-please
    if: needs.release-please.outputs.ears--release_created == 'true'
    runs-on: ubuntu-latest
    environment: maki-ears
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build --package maki-ears --out-dir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-immune:
    needs: release-please
    if: needs.release-please.outputs.immune--release_created == 'true'
    runs-on: ubuntu-latest
    environment: maki-immune
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build --package maki-immune --out-dir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-recall:
    needs: release-please
    if: needs.release-please.outputs.recall--release_created == 'true'
    runs-on: ubuntu-latest
    environment: maki-recall
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build --package maki-recall --out-dir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-synapse:
    needs: release-please
    if: needs.release-please.outputs.synapse--release_created == 'true'
    runs-on: ubuntu-latest
    environment: maki-synapse
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build --package maki-synapse --out-dir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
