name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      common: ${{ steps.filter.outputs.common }}
      cortex: ${{ steps.filter.outputs.cortex }}
      stem: ${{ steps.filter.outputs.stem }}
      ears: ${{ steps.filter.outputs.ears }}
      immune: ${{ steps.filter.outputs.immune }}
      recall: ${{ steps.filter.outputs.recall }}
      synapse: ${{ steps.filter.outputs.synapse }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common:
              - 'pkgs/maki-common/**'
              - 'pyproject.toml'
              - 'uv.lock'
            cortex:
              - 'pkgs/maki-cortex/**'
              - 'pkgs/maki-common/**'
              - 'pyproject.toml'
              - 'uv.lock'
            stem:
              - 'pkgs/maki-stem/**'
              - 'pkgs/maki-common/**'
              - 'pyproject.toml'
              - 'uv.lock'
            ears:
              - 'pkgs/maki-ears/**'
              - 'pkgs/maki-common/**'
              - 'pyproject.toml'
              - 'uv.lock'
            immune:
              - 'pkgs/maki-immune/**'
              - 'pkgs/maki-common/**'
              - 'pyproject.toml'
              - 'uv.lock'
            recall:
              - 'pkgs/maki-recall/**'
              - 'pkgs/maki-common/**'
              - 'pyproject.toml'
              - 'uv.lock'
            synapse:
              - 'pkgs/maki-synapse/**'
              - 'pkgs/maki-common/**'
              - 'pyproject.toml'
              - 'uv.lock'
            any:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'

  lint:
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint
        run: uvx ruff check pkgs/
      - name: Format check
        run: uvx ruff format --check pkgs/

  status:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.changes.outputs.any }}" != "true" ]; then
            echo "No changes detected"
            exit 0
          fi

          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "::error::Lint checks failed"
            exit 1
          fi
